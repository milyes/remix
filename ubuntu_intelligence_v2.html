<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Ubuntu+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body {
    font-family: 'Ubuntu', sans-serif;
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #772953 0%, #2c001e 100%);
    height: 100vh;
    color: white;
  }
  .ubuntu-mono { font-family: 'Ubuntu Mono', monospace; }

  /* Scrollbar */
  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  #output::-webkit-scrollbar-thumb { background: #E95420; border-radius: 3px; }

  /* Markdown */
  .md h1,.md h2,.md h3 { font-weight:700; margin:0.8rem 0 0.4rem; color:#E95420; }
  .md h1 { font-size:1.2rem; }
  .md h2 { font-size:1.05rem; }
  .md h3 { font-size:0.95rem; }
  .md p  { margin-bottom:0.6rem; line-height:1.6; }
  .md ul,.md ol { margin-left:1.4rem; margin-bottom:0.6rem; }
  .md ul { list-style:disc; }
  .md ol { list-style:decimal; }
  .md li { margin-bottom:0.2rem; }
  .md code {
    background:rgba(0,0,0,0.35);
    padding:0.1rem 0.35rem;
    border-radius:0.2rem;
    font-family:'Ubuntu Mono',monospace;
    color:#87ff5f;
    font-size:0.88em;
  }
  .md pre {
    background:rgba(0,0,0,0.4);
    border-radius:0.4rem;
    padding:1rem;
    margin-bottom:0.8rem;
    overflow-x:auto;
  }
  .md pre code { background:transparent; padding:0; color:#87ff5f; font-size:13px; }
  .md blockquote {
    border-left:3px solid #E95420;
    padding-left:1rem;
    margin-left:0.5rem;
    font-style:italic;
    color:#ccc;
  }
  .md table { width:100%; border-collapse:collapse; margin-bottom:0.8rem; font-size:0.85rem; }
  .md th,.md td { border:1px solid rgba(255,255,255,0.1); padding:0.4rem 0.6rem; text-align:left; }
  .md th { background:rgba(233,84,32,0.15); }
  .md a { color:#E95420; }
  .md a:hover { text-decoration:underline; }

  /* Typing indicator */
  .typing span {
    display:inline-block;
    width:6px; height:6px;
    background:#E95420;
    border-radius:50%;
    animation:bounce 1.2s infinite;
    margin:0 2px;
  }
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

  /* Message animation */
  .msg { animation: slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  /* Input glow */
  #userInput:focus { outline:none; }
  .input-wrap:focus-within { box-shadow:0 0 0 2px #E95420; }
</style>
</head>
<body>
<div style="height:100vh;display:flex;flex-direction:column;max-width:900px;margin:0 auto;padding:16px;gap:12px;">

  <!-- HEADER -->
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(255,255,255,0.08);">
    <!-- Ubuntu logo circle -->
    <div style="width:36px;height:36px;border-radius:50%;background:#E95420;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <circle cx="12" cy="12" r="3"/>
        <circle cx="12" cy="3" r="2.5"/>
        <circle cx="20.5" cy="16.5" r="2.5"/>
        <circle cx="3.5" cy="16.5" r="2.5"/>
        <line x1="12" y1="6" x2="12" y2="9" stroke="white" stroke-width="1.5"/>
        <line x1="17.8" y1="13.5" x2="15.2" y2="11.9" stroke="white" stroke-width="1.5"/>
        <line x1="6.2" y1="13.5" x2="8.8" y2="11.9" stroke="white" stroke-width="1.5"/>
      </svg>
    </div>
    <div>
      <div style="font-weight:700;font-size:1rem;letter-spacing:0.5px;">Ubuntu Intelligence</div>
      <div class="ubuntu-mono" style="font-size:0.7rem;color:#E95420;opacity:0.9;">Noyau Claude Sonnet · Ubuntu 24.04 LTS</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
      <div id="statusDot" style="width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;"></div>
      <span style="font-size:0.75rem;color:#94a3b8;" id="statusText">Prêt</span>
    </div>
  </div>

  <!-- TERMINAL OUTPUT -->
  <div id="output" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px;"></div>

  <!-- INPUT -->
  <div class="input-wrap ubuntu-mono" style="display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 16px;transition:box-shadow 0.2s;">
    <span style="color:#E95420;white-space:nowrap;font-size:0.85rem;">ubuntu@intelligence:~$</span>
    <input id="userInput" type="text"
      style="flex:1;background:transparent;border:none;color:white;font-family:'Ubuntu Mono',monospace;font-size:0.85rem;caret-color:#E95420;"
      placeholder="entrer une commande ou poser une question..."
      autocomplete="off" spellcheck="false">
    <button id="sendBtn" onclick="sendMessage()"
      style="background:#E95420;border:none;border-radius:6px;padding:6px 14px;color:white;font-family:'Ubuntu',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background 0.2s;">
      Envoyer
    </button>
  </div>

</div>

<script>
const output   = document.getElementById('output');
const input    = document.getElementById('userInput');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

const history = [];

const SYSTEM = `Tu es Ubuntu Intelligence, un assistant terminal intelligent propulsé par Claude, tournant sur Ubuntu 24.04 LTS.
Ton identité : ubuntu@intelligence. Tu combines la puissance d'un shell Unix et d'un assistant IA.

Comportement :
- Pour les commandes shell classiques (ls, pwd, date, whoami, uname, df, free, ps, top, etc.) : simule une sortie réaliste et cohérente.
- Pour les questions techniques, de code, de sécurité, de réseau : réponds de manière experte et concise.
- Pour les questions générales : réponds naturellement mais avec un ton technique.
- Utilise du Markdown quand c'est utile (code, listes, tableaux).
- Reste dans le personnage du terminal intelligent. Tu peux être légèrement poétique sur la philosophie open-source et Ubuntu.
- Réponds en français par défaut sauf si l'utilisateur écrit en anglais.`;

function setStatus(text, color, glow) {
  statusDot.style.background = color;
  statusDot.style.boxShadow = `0 0 6px ${glow || color}`;
  statusText.textContent = text;
}

function addMessage(role, content, isMarkdown = false) {
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  wrap.style.cssText = 'display:flex;gap:10px;align-items:flex-start;';

  if (role === 'user') {
    wrap.innerHTML = `
      <div style="margin-left:auto;max-width:85%;background:rgba(233,84,32,0.15);border:1px solid rgba(233,84,32,0.3);border-radius:10px 10px 2px 10px;padding:10px 14px;">
        <div class="ubuntu-mono" style="font-size:0.75rem;color:#E95420;margin-bottom:4px;">ubuntu@intelligence:~$ ${escHtml(content)}</div>
      </div>`;
  } else if (role === 'assistant') {
    const inner = document.createElement('div');
    inner.style.cssText = 'max-width:92%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:2px 10px 10px 10px;padding:12px 16px;';
    const label = document.createElement('div');
    label.className = 'ubuntu-mono';
    label.style.cssText = 'font-size:0.7rem;color:#94a3b8;margin-bottom:6px;';
    label.textContent = '● Claude Sonnet';
    const body = document.createElement('div');
    body.className = 'md';
    body.style.fontSize = '0.88rem';
    body.style.lineHeight = '1.65';
    body.innerHTML = marked.parse(content);
    inner.appendChild(label);
    inner.appendChild(body);
    wrap.appendChild(inner);
  } else if (role === 'system') {
    wrap.innerHTML = `
      <div style="width:100%;text-align:center;">
        <span class="ubuntu-mono" style="font-size:0.75rem;color:#64748b;background:rgba(0,0,0,0.2);padding:4px 12px;border-radius:20px;">${escHtml(content)}</span>
      </div>`;
  }

  output.appendChild(wrap);
  output.scrollTop = output.scrollHeight;
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.id = 'typing';
  wrap.className = 'msg';
  wrap.style.cssText = 'display:flex;gap:10px;align-items:flex-start;';
  wrap.innerHTML = `
    <div style="background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:2px 10px 10px 10px;padding:12px 16px;">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  output.appendChild(wrap);
  output.scrollTop = output.scrollHeight;
  return wrap;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  input.disabled = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', cmd);
  history.push({ role: 'user', content: cmd });

  const typing = addTyping();
  setStatus('Traitement...', '#fbbf24');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    const reply = data.content?.map(b => b.text || '').join('') || '[Erreur: réponse vide]';
    history.push({ role: 'assistant', content: reply });

    typing.remove();
    addMessage('assistant', reply, true);
    setStatus('Prêt', '#22c55e');
  } catch(err) {
    typing.remove();
    addMessage('assistant', `**Erreur réseau :** ${err.message}\n\nVérifiez votre connexion et réessayez.`);
    setStatus('Erreur', '#f87171');
  }

  input.disabled = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

// Enter key
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// History nav
const cmdHist = []; let hIdx = -1;
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (hIdx < cmdHist.length-1) { hIdx++; input.value = cmdHist[hIdx]; }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (hIdx > 0) { hIdx--; input.value = cmdHist[hIdx]; }
    else { hIdx=-1; input.value=''; }
  }
});

// Boot
(function boot() {
  addMessage('system', 'Ubuntu 24.04.1 LTS (GNU/Linux 6.8.0-generic x86_64)');
  addMessage('system', 'Noyau IA : Claude Sonnet · Capacités : Langage Naturel, Simulation Shell, Raisonnement');
  addMessage('assistant', `Bienvenue sur **Ubuntu Intelligence** 🟠

Je suis ton terminal intelligent propulsé par Claude. Tu peux :

- Taper des **commandes shell** : \`ls\`, \`pwd\`, \`date\`, \`uname -a\`, \`df -h\`...
- Poser des **questions techniques** : sécurité, réseau, code, scripts
- Demander de l'**aide** : \`help\` pour voir les commandes disponibles

*ubuntu@intelligence:~$* _`);
  input.focus();
})();
</script>
</body>
</html>
